<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restomod Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0d;--bg2:#1a1a16;--bg3:#222220;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8e6de;--text2:#8a8880;--text3:#5a5855;
  --accent:#c8a84b;--accent2:#a08535;
  --danger:#c85c45;--success:#5a9e6f;--info:#4a82b8;--warn:#c87d3a;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:8px;--radius-lg:12px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.header{border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:baseline;gap:12px;}
.header-title{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent);letter-spacing:0.04em;}
.header-sub{font-size:12px;color:var(--text3);font-family:var(--mono);}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-size:13px;font-family:var(--font);background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color 0.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.section{display:none;padding:1.25rem 1.5rem;}
.section.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.metric-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em;}
.metric-value{font-size:22px;font-weight:600;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:500;margin-bottom:1rem;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.row:last-child{margin-bottom:0;}
input[type="text"],input[type="number"],input[type="date"],select,textarea{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);
  color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;
  outline:none;transition:border-color 0.15s;flex:1;min-width:110px;
}
input[type="text"]:focus,input[type="number"]:focus,input[type="date"]:focus,select:focus,textarea:focus{border-color:var(--accent2);}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
select option{background:var(--bg3);}
textarea{min-height:60px;resize:vertical;}
.btn{padding:7px 14px;font-size:13px;font-family:var(--font);border-radius:var(--radius);cursor:pointer;white-space:nowrap;transition:all 0.12s;border:1px solid var(--border2);background:transparent;color:var(--text);}
.btn:hover{background:var(--bg3);}
.btn-primary{background:var(--accent);color:#0f0f0d;border-color:var(--accent);font-weight:500;}
.btn-primary:hover{background:#d4b455;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{color:var(--danger);border-color:transparent;background:transparent;}
.btn-danger:hover{background:rgba(200,92,69,0.12);}
.btn-ghost{border-color:transparent;color:var(--text2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;font-family:var(--mono);}
.badge-high{background:rgba(200,92,69,0.18);color:#e07060;border:1px solid rgba(200,92,69,0.25);}
.badge-med{background:rgba(200,125,58,0.18);color:#d48a50;border:1px solid rgba(200,125,58,0.25);}
.badge-low{background:rgba(90,158,111,0.15);color:#6ab880;border:1px solid rgba(90,158,111,0.22);}
.badge-done{background:rgba(90,158,111,0.15);color:#6ab880;border:1px solid rgba(90,158,111,0.22);}
.badge-ordered{background:rgba(74,130,184,0.15);color:#70a8d8;border:1px solid rgba(74,130,184,0.22);}
.badge-away{background:rgba(200,125,58,0.18);color:#d48a50;border:1px solid rgba(200,125,58,0.25);}
.badge-received{background:rgba(90,158,111,0.15);color:#6ab880;border:1px solid rgba(90,158,111,0.22);}
.badge-accepted{background:rgba(90,158,111,0.15);color:#6ab880;border:1px solid rgba(90,158,111,0.22);}
.badge-pending{background:rgba(200,125,58,0.18);color:#d48a50;border:1px solid rgba(200,125,58,0.25);}
.badge-rejected{background:rgba(200,92,69,0.18);color:#e07060;border:1px solid rgba(200,92,69,0.25);}
.badge-urgent{background:rgba(200,92,69,0.18);color:#e07060;border:1px solid rgba(200,92,69,0.25);}
.badge-noted{background:rgba(90,88,85,0.25);color:var(--text3);border:1px solid var(--border);}
.badge-actioned{background:rgba(90,158,111,0.15);color:#6ab880;border:1px solid rgba(90,158,111,0.22);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-family:var(--mono);font-size:13px;}
.field-label{font-size:12px;color:var(--text3);white-space:nowrap;font-family:var(--mono);}
.overdue{color:var(--danger)!important;}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem;}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;transition:border-color 0.15s;}
.comp-card:hover{border-color:var(--border2);}
.comp-card-name{font-size:13px;font-weight:500;margin-bottom:6px;}
.comp-card-meta{font-size:11px;color:var(--text3);margin-bottom:8px;font-family:var(--mono);}
.comp-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.comp-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
.comp-section{margin-bottom:1.5rem;}
.comp-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;user-select:none;}
.comp-header-name{font-size:15px;font-weight:500;flex:1;}
.comp-header-meta{font-size:12px;color:var(--text3);font-family:var(--mono);}
.comp-header-bar{width:80px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.comp-header-bar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.comp-toggle{font-size:11px;color:var(--text3);}
.comp-jobs.collapsed{display:none;}
.job-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;transition:border-color 0.15s;}
.job-item:hover{border-color:var(--border2);}
.job-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:transparent;}
.job-check.checked{background:#5a9e6f;border-color:#5a9e6f;}
.job-check.checked::after{content:'';display:block;width:5px;height:8px;border:2px solid #0f0f0d;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.job-body{flex:1;min-width:0;}
.job-title{font-size:13px;font-weight:500;}
.job-title.done{text-decoration:line-through;opacity:0.4;}
.job-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.job-actions{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.add-job-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;transition:border-color 0.15s;}
.item:hover{border-color:var(--border2);}
.item-header{display:flex;align-items:flex-start;gap:10px;}
.item-title{font-size:14px;font-weight:500;flex:1;}
.item-sub{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
.done-item{opacity:0.45;}
.done-item .item-title{text-decoration:line-through;}
.insp-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.insp-item.urgent{border-left:3px solid var(--danger);border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
.insp-item.actioned{opacity:0.4;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:5px 12px;font-size:12px;font-family:var(--mono);border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;transition:all 0.12s;}
.filter-btn.active{background:var(--accent);color:#0f0f0d;border-color:var(--accent);}
.ov-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.ov-bar-track{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.ov-bar-fill{height:100%;border-radius:5px;background:var(--accent);transition:width 0.5s ease;}
@media(max-width:480px){.header,.section{padding:1rem;}.tabs{padding:0 1rem;}}
</style>
</head>
<body>

<div class="header">
  <span class="header-title" id="header-title">RESTOMOD</span>
  <span class="header-sub">build tracker</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('overview',this)">Overview</button>
  <button class="tab" onclick="showTab('jobs',this)">Jobs</button>
  <button class="tab" onclick="showTab('inspection',this)">Inspection</button>
  <button class="tab" onclick="showTab('orders',this)">Orders</button>
  <button class="tab" onclick="showTab('costs',this)">Costs</button>
  <button class="tab" onclick="showTab('away',this)">Away</button>
  <button class="tab" onclick="showTab('quotes',this)">Quotes</button>
</div>

<!-- OVERVIEW -->
<div id="tab-overview" class="section active">
  <div class="metrics" id="ov-metrics"></div>
  <div class="card" style="margin-bottom:12px;">
    <div class="card-title">Overall progress</div>
    <div class="ov-bar-wrap">
      <div class="ov-bar-track"><div class="ov-bar-fill" id="ov-bar" style="width:0%"></div></div>
      <span id="ov-pct" style="font-size:18px;font-weight:600;min-width:44px;text-align:right;color:var(--accent);">0%</span>
    </div>
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono);" id="ov-summary"></div>
  </div>
  <div style="font-size:15px;font-weight:500;margin-bottom:10px;">Components</div>
  <div class="comp-grid" id="comp-grid"></div>
</div>

<!-- JOBS -->
<div id="tab-jobs" class="section">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;">
    <div style="font-size:15px;font-weight:500;flex:1;" id="jobs-heading">All jobs</div>
    <button class="btn btn-sm btn-ghost" onclick="setJobFilter(null)" id="filter-all" style="display:none;">All components</button>
  </div>
  <div id="jobs-by-comp"></div>
</div>

<!-- INSPECTION -->
<div id="tab-inspection" class="section">
  <div class="card">
    <div class="card-title">Log finding</div>
    <div class="row">
      <select id="insp-comp"><option value="">Select component</option><option>Engine</option><option>Gearbox</option><option>Front axle</option><option>Rear axle</option><option>Chassis</option><option>Suspension</option><option>Body</option><option>Electrical</option><option>General</option></select>
      <select id="insp-sev"><option value="noted">Noted — monitor</option><option value="med">Needs attention</option><option value="urgent">Urgent — must fix</option></select>
    </div>
    <div class="row"><textarea id="insp-obs" placeholder="What was observed..." style="width:100%;flex:none;"></textarea></div>
    <div class="row"><textarea id="insp-rect" placeholder="What needs to be done..." style="width:100%;flex:none;min-height:52px;"></textarea></div>
    <div class="row" style="justify-content:flex-end;"><button class="btn btn-primary" onclick="addInspection()">Log finding</button></div>
  </div>
  <div class="filter-bar" id="insp-filters"></div>
  <div id="insp-list"></div>
</div>

<!-- ORDERS -->
<div id="tab-orders" class="section">
  <div class="card">
    <div class="card-title">Add order</div>
    <div class="row"><input type="text" id="ord-item" placeholder="Part / item name" style="flex:2;min-width:180px;" /><input type="text" id="ord-supplier" placeholder="Supplier" /></div>
    <div class="row">
      <span class="field-label">Ordered</span><input type="date" id="ord-date" style="flex:none;width:140px;" />
      <span class="field-label">Expected</span><input type="date" id="ord-eta" style="flex:none;width:140px;" />
      <input type="number" id="ord-cost" placeholder="Cost $" style="flex:none;width:100px;" />
    </div>
    <div class="row">
      <select id="ord-status"><option value="ordered">Ordered</option><option value="away">Away</option><option value="received">Received</option></select>
      <input type="text" id="ord-notes" placeholder="Notes / part number" />
      <button class="btn btn-primary" onclick="addOrder()">Add order</button>
    </div>
  </div>
  <div id="orders-list"></div>
</div>

<!-- COSTS -->
<div id="tab-costs" class="section">
  <div class="metrics" id="costs-metrics"></div>
  <div class="card">
    <div class="card-title">Add expense</div>
    <div class="row"><input type="text" id="cost-desc" placeholder="Description" style="flex:2;" /><select id="cost-cat"><option>Parts</option><option>Labour</option><option>Tools</option><option>Materials</option><option>Other</option></select></div>
    <div class="row">
      <span class="field-label">Date</span><input type="date" id="cost-date" style="flex:none;width:140px;" />
      <input type="number" id="cost-amount" placeholder="Amount $" style="flex:none;width:120px;" />
      <input type="text" id="cost-notes" placeholder="Notes" />
      <button class="btn btn-primary" onclick="addCost()">Add</button>
    </div>
  </div>
  <div id="costs-list"></div>
</div>

<!-- AWAY -->
<div id="tab-away" class="section">
  <div class="card">
    <div class="card-title">Log item away</div>
    <div class="row"><input type="text" id="away-item" placeholder="Item / component" style="flex:2;" /><input type="text" id="away-where" placeholder="Where sent" /></div>
    <div class="row">
      <span class="field-label">Sent</span><input type="date" id="away-sent" style="flex:none;width:140px;" />
      <span class="field-label">Back</span><input type="date" id="away-eta" style="flex:none;width:140px;" />
      <input type="text" id="away-notes" placeholder="Notes / contact" />
      <button class="btn btn-primary" onclick="addAway()">Log</button>
    </div>
  </div>
  <div id="away-list"></div>
</div>

<!-- QUOTES -->
<div id="tab-quotes" class="section">
  <div class="card">
    <div class="card-title">Add quote</div>
    <div class="row"><input type="text" id="q-desc" placeholder="Work / item" style="flex:2;" /><input type="text" id="q-supplier" placeholder="Supplier / tradesperson" /></div>
    <div class="row">
      <span class="field-label">Date</span><input type="date" id="q-date" style="flex:none;width:140px;" />
      <input type="number" id="q-amount" placeholder="Amount $" style="flex:none;width:120px;" />
      <select id="q-status"><option value="pending">Pending</option><option value="accepted">Accepted</option><option value="rejected">Rejected</option></select>
      <button class="btn btn-primary" onclick="addQuote()">Add</button>
    </div>
    <div class="row"><input type="text" id="q-notes" placeholder="Notes" style="width:100%;" /></div>
  </div>
  <div id="quotes-list"></div>
</div>

<script>
const COMPONENTS=['Engine','Gearbox','Front axle','Rear axle','Chassis','Suspension','Body','Electrical'];
const STORAGE_KEY='restomod_tracker_v1';
let state={jobs:[],orders:[],costs:[],away:[],quotes:[],inspections:[],vehicle:{}};
let collapsed={};
let activeJobFilter=null;
let inspFilter='all';

function loadState(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)state=JSON.parse(d);}catch(e){}
  if(!state.inspections)state.inspections=[];
  if(!state.vehicle)state.vehicle={};
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function overdue(d){return d&&d<today();}
function fmt(v){return '$'+parseFloat(v||0).toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function barColor(pct){if(pct===100)return'#5a9e6f';if(pct>=60)return'#4a82b8';if(pct>=20)return'#c87d3a';return'#5a5855';}
function priorityBadge(p){if(p==='high')return'<span class="badge badge-high">High</span>';if(p==='low')return'<span class="badge badge-low">Low</span>';return'<span class="badge badge-med">Med</span>';}

function showTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(el)el.classList.add('active');
  render();
}
function setJobFilter(comp){activeJobFilter=comp;renderJobs();}
function goToJobs(comp){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-jobs').classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active');
  activeJobFilter=comp;renderJobs();
}
function toggleCollapse(comp){collapsed[comp]=!collapsed[comp];renderJobs();}
function getCompStats(comp){const jobs=state.jobs.filter(j=>j.component===comp);const done=jobs.filter(j=>j.status==='done').length;return{total:jobs.length,done,pct:jobs.length?Math.round(done/jobs.length*100):0};}

function renderOverview(){
  const v=state.vehicle;
  if(v&&v.make)document.getElementById('header-title').textContent=`${v.year||''} ${v.make} ${v.model||''}`.trim().toUpperCase();
  const total=state.jobs.length,done=state.jobs.filter(j=>j.status==='done').length,inprog=state.jobs.filter(j=>j.status==='inprog').length;
  const pct=total?Math.round(done/total*100):0;
  const urgent=state.inspections.filter(i=>i.severity==='urgent'&&i.status!=='actioned').length;
  document.getElementById('ov-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total jobs</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-value">${done}</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-value">${inprog}</div></div>
    <div class="metric"><div class="metric-label">Open orders</div><div class="metric-value">${state.orders.filter(o=>o.status!=='received').length}</div></div>
    <div class="metric"><div class="metric-label">Items away</div><div class="metric-value">${state.away.filter(a=>!a.returned).length}</div></div>
    <div class="metric"><div class="metric-label"style="${urgent?'color:var(--danger)':''}">Urgent</div><div class="metric-value"style="${urgent?'color:var(--danger)':''}">${urgent}</div></div>
    <div class="metric"><div class="metric-label">Spent</div><div class="metric-value"style="font-size:15px;">${fmt(state.costs.reduce((s,c)=>s+(c.amount||0),0))}</div></div>
  `;
  document.getElementById('ov-bar').style.width=pct+'%';
  document.getElementById('ov-pct').textContent=pct+'%';
  document.getElementById('ov-summary').textContent=total?`${done} of ${total} jobs done · ${inprog} in progress · ${total-done-inprog} to do`:'No jobs yet.';
  document.getElementById('comp-grid').innerHTML=COMPONENTS.map(comp=>{
    const s=getCompStats(comp),col=barColor(s.pct);
    const urg=state.inspections.filter(i=>i.comp===comp&&i.severity==='urgent'&&i.status!=='actioned').length;
    return`<div class="comp-card"onclick="goToJobs('${comp}')">
      <div class="comp-card-name">${comp}${urg?` <span style="color:var(--danger);font-size:10px;">●${urg}</span>`:''}</div>
      <div class="comp-card-meta">${s.done}/${s.total} · ${s.pct}%</div>
      <div class="comp-bar-track"><div class="comp-bar-fill"style="width:${s.pct}%;background:${col};"></div></div>
    </div>`;
  }).join('');
}

function renderJobs(){
  const h=document.getElementById('jobs-heading'),fb=document.getElementById('filter-all');
  h.textContent=activeJobFilter?activeJobFilter+' jobs':'All jobs';
  fb.style.display=activeJobFilter?'inline-block':'none';
  const comps=activeJobFilter?[activeJobFilter]:COMPONENTS;
  const untagged=state.jobs.filter(j=>!j.component||!COMPONENTS.includes(j.component));
  let html='';
  comps.forEach(comp=>{
    const jobs=state.jobs.filter(j=>j.component===comp);
    const s=getCompStats(comp),col=barColor(s.pct),isCol=collapsed[comp];
    html+=`<div class="comp-section"><div class="comp-header"onclick="toggleCollapse('${comp}')">
      <div class="comp-header-name">${comp}</div>
      <div class="comp-header-bar"><div class="comp-header-bar-fill"style="width:${s.pct}%;background:${col};"></div></div>
      <div class="comp-header-meta">${s.done}/${s.total}</div>
      <div class="comp-toggle">${isCol?'▸':'▾'}</div>
    </div><div class="comp-jobs${isCol?' collapsed':''}">`;
    if(!jobs.length){html+=`<div style="font-size:12px;color:var(--text3);padding:4px 0;font-family:var(--mono);">No jobs yet</div>`;}
    else{
      const ord={high:0,med:1,low:2};
      [...jobs].sort((a,b)=>(a.status==='done'?1:0)-(b.status==='done'?1:0)||(ord[a.priority]||1)-(ord[b.priority]||1)).forEach(j=>{
        const isDone=j.status==='done';
        html+=`<div class="job-item"><div class="job-check${isDone?' checked':''}"onclick="toggleDone('${j.id}')"></div>
          <div class="job-body"><div class="job-title${isDone?' done':''}">${j.name}</div>${j.notes?`<div class="job-sub">${j.notes}</div>`:''}</div>
          <div class="job-actions">${!isDone?priorityBadge(j.priority):''}<button class="btn btn-danger btn-sm"onclick="del('jobs','${j.id}')">✕</button></div>
        </div>`;
      });
    }
    html+=`<div class="add-job-row">
      <input type="text"id="nj-${comp.replace(/\s/g,'_')}"placeholder="Add a job..."style="flex:2;min-width:140px;font-size:12px;padding:6px 10px;"onkeydown="if(event.key==='Enter')quickAdd('${comp}')" />
      <select id="np-${comp.replace(/\s/g,'_')}"style="flex:none;width:auto;font-size:12px;padding:6px 8px;"><option value="high">High</option><option value="med"selected>Med</option><option value="low">Low</option></select>
      <button class="btn btn-primary btn-sm"onclick="quickAdd('${comp}')">+ Add</button>
    </div></div></div>`;
  });
  if(!activeJobFilter&&untagged.length){
    html+=`<div class="comp-section"><div class="comp-header"><div class="comp-header-name"style="color:var(--text3);">Unassigned</div></div><div class="comp-jobs">`;
    untagged.forEach(j=>{html+=`<div class="job-item"><div class="job-check${j.status==='done'?' checked':''}"onclick="toggleDone('${j.id}')"></div><div class="job-body"><div class="job-title${j.status==='done'?' done':''}">${j.name}</div></div><div class="job-actions">${priorityBadge(j.priority)}<button class="btn btn-danger btn-sm"onclick="del('jobs','${j.id}')">✕</button></div></div>`;});
    html+=`</div></div>`;
  }
  document.getElementById('jobs-by-comp').innerHTML=html;
}

function quickAdd(comp){
  const k=comp.replace(/\s/g,'_'),el=document.getElementById('nj-'+k),name=el.value.trim();
  if(!name)return;
  state.jobs.push({id:uid(),name,priority:document.getElementById('np-'+k).value,status:'todo',component:comp,notes:'',created:today()});
  el.value='';saveState();renderJobs();renderOverview();
}
function toggleDone(id){const j=state.jobs.find(x=>x.id===id);if(j){j.status=j.status==='done'?'todo':'done';saveState();renderJobs();renderOverview();}}
function del(type,id){state[type]=state[type].filter(x=>x.id!==id);saveState();render();}

function addInspection(){
  const obs=document.getElementById('insp-obs').value.trim();if(!obs)return;
  state.inspections.push({id:uid(),comp:document.getElementById('insp-comp').value||'General',observation:obs,rectification:document.getElementById('insp-rect').value.trim(),severity:document.getElementById('insp-sev').value,status:'noted',date:today()});
  document.getElementById('insp-obs').value='';document.getElementById('insp-rect').value='';
  saveState();renderInspection();renderOverview();
}
function updateInspStatus(id,val){const i=state.inspections.find(x=>x.id===id);if(i){i.status=val;saveState();renderInspection();}}
function setInspFilter(f){inspFilter=f;renderInspection();}

function renderInspection(){
  const c={all:state.inspections.length,urgent:state.inspections.filter(i=>i.severity==='urgent'&&i.status!=='actioned').length,open:state.inspections.filter(i=>i.status!=='actioned').length,actioned:state.inspections.filter(i=>i.status==='actioned').length};
  document.getElementById('insp-filters').innerHTML=[['all',`All (${c.all})`],['urgent',`Urgent (${c.urgent})`],['open',`Open (${c.open})`],['actioned',`Actioned (${c.actioned})`]].map(([v,l])=>`<button class="filter-btn${inspFilter===v?' active':''}"onclick="setInspFilter('${v}')">${l}</button>`).join('');
  const filtered=state.inspections.filter(i=>{if(inspFilter==='urgent')return i.severity==='urgent'&&i.status!=='actioned';if(inspFilter==='open')return i.status!=='actioned';if(inspFilter==='actioned')return i.status==='actioned';return true;}).sort((a,b)=>{const s={urgent:0,med:1,noted:2};if(a.status==='actioned'&&b.status!=='actioned')return 1;if(b.status==='actioned'&&a.status!=='actioned')return-1;return(s[a.severity]||2)-(s[b.severity]||2);});
  const el=document.getElementById('insp-list');
  if(!filtered.length){el.innerHTML='<div class="empty">No findings logged yet</div>';return;}
  const sevBadge=s=>s==='urgent'?'<span class="badge badge-urgent">Urgent</span>':s==='med'?'<span class="badge badge-med">Needs attention</span>':'<span class="badge badge-noted">Noted</span>';
  el.innerHTML=filtered.map(i=>`<div class="insp-item${i.severity==='urgent'&&i.status!=='actioned'?' urgent':''}${i.status==='actioned'?' actioned':''}">
    <div style="display:flex;align-items:flex-start;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;font-family:var(--mono);">${i.comp}</span>
          ${sevBadge(i.severity)}${i.status==='actioned'?'<span class="badge badge-actioned">Actioned</span>':''}
          <span style="font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--mono);">${fmtDate(i.date)}</span>
        </div>
        <div style="font-size:14px;font-weight:500;margin-bottom:${i.rectification?'6px':'0'};">${i.observation}</div>
        ${i.rectification?`<div style="font-size:12px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;font-family:var(--mono);"><span style="display:block;margin-bottom:2px;color:var(--text3);">Rectification needed</span>${i.rectification}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
        <select class="btn btn-sm"style="padding:4px 8px;font-size:12px;"onchange="updateInspStatus('${i.id}',this.value)">
          <option value="noted"${i.status==='noted'?' selected':''}>Open</option>
          <option value="actioned"${i.status==='actioned'?' selected':''}>Actioned</option>
        </select>
        <button class="btn btn-danger btn-sm"onclick="del('inspections','${i.id}')">✕</button>
      </div>
    </div>
  </div>`).join('');
}

function addOrder(){
  const item=document.getElementById('ord-item').value.trim();if(!item)return;
  state.orders.push({id:uid(),item,supplier:document.getElementById('ord-supplier').value.trim(),date:document.getElementById('ord-date').value,eta:document.getElementById('ord-eta').value,cost:document.getElementById('ord-cost').value,status:document.getElementById('ord-status').value,notes:document.getElementById('ord-notes').value.trim()});
  ['ord-item','ord-supplier','ord-date','ord-eta','ord-cost','ord-notes'].forEach(id=>document.getElementById(id).value='');
  saveState();renderOrders();renderOverview();
}
function updateOrderStatus(id,val){const o=state.orders.find(x=>x.id===id);if(o){o.status=val;saveState();renderOrders();renderOverview();}}

function renderOrders(){
  const el=document.getElementById('orders-list');
  if(!state.orders.length){el.innerHTML='<div class="empty">No orders yet</div>';return;}
  el.innerHTML=[...state.orders].sort((a,b)=>(a.eta||'9')>(b.eta||'9')?1:-1).map(o=>`
    <div class="item"><div class="item-header">
      <div style="flex:1;"><div class="item-title">${o.item}</div>
      <div class="item-sub">${[o.supplier,o.date?'Ordered '+fmtDate(o.date):'',o.eta?`<span class="${overdue(o.eta)&&o.status!=='received'?'overdue':''}">ETA ${fmtDate(o.eta)}</span>`:''].filter(Boolean).join(' · ')}</div>
      ${o.notes?`<div class="item-sub">${o.notes}</div>`:''}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        ${o.cost?`<span style="font-size:13px;font-weight:500;color:var(--accent);">${fmt(o.cost)}</span>`:''}
        <select class="btn btn-sm"style="padding:4px 8px;"onchange="updateOrderStatus('${o.id}',this.value)">
          <option value="ordered"${o.status==='ordered'?' selected':''}>Ordered</option>
          <option value="away"${o.status==='away'?' selected':''}>Away</option>
          <option value="received"${o.status==='received'?' selected':''}>Received</option>
        </select>
        <button class="btn btn-danger btn-sm"onclick="del('orders','${o.id}')">✕</button>
      </div>
    </div></div>`).join('');
}

function addCost(){
  const desc=document.getElementById('cost-desc').value.trim(),amt=document.getElementById('cost-amount').value;
  if(!desc||!amt)return;
  state.costs.push({id:uid(),desc,cat:document.getElementById('cost-cat').value,date:document.getElementById('cost-date').value,amount:parseFloat(amt),notes:document.getElementById('cost-notes').value.trim()});
  ['cost-desc','cost-date','cost-amount','cost-notes'].forEach(id=>document.getElementById(id).value='');
  saveState();renderCosts();renderOverview();
}
function renderCosts(){
  const total=state.costs.reduce((s,c)=>s+(c.amount||0),0),byCat={};
  state.costs.forEach(c=>{byCat[c.cat]=(byCat[c.cat]||0)+c.amount;});
  document.getElementById('costs-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total spent</div><div class="metric-value"style="color:var(--accent);">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Entries</div><div class="metric-value">${state.costs.length}</div></div>
    ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k,v])=>`<div class="metric"><div class="metric-label">${k}</div><div class="metric-value"style="font-size:16px;">${fmt(v)}</div></div>`).join('')}`;
  const el=document.getElementById('costs-list');
  if(!state.costs.length){el.innerHTML='<div class="empty">No costs yet</div>';return;}
  el.innerHTML=[...state.costs].sort((a,b)=>(b.date||'')>(a.date||'')?1:-1).map(c=>`
    <div class="item"><div class="item-header">
      <div style="flex:1;"><div class="item-title">${c.desc}</div><div class="item-sub">${[c.cat,c.date?fmtDate(c.date):'',c.notes].filter(Boolean).join(' · ')}</div></div>
      <div style="display:flex;gap:8px;align-items:center;"><span style="font-size:15px;font-weight:500;color:var(--accent);">${fmt(c.amount)}</span><button class="btn btn-danger btn-sm"onclick="del('costs','${c.id}')">✕</button></div>
    </div></div>`).join('');
}

function addAway(){
  const item=document.getElementById('away-item').value.trim();if(!item)return;
  state.away.push({id:uid(),item,where:document.getElementById('away-where').value.trim(),sent:document.getElementById('away-sent').value,eta:document.getElementById('away-eta').value,notes:document.getElementById('away-notes').value.trim(),returned:false});
  ['away-item','away-where','away-sent','away-eta','away-notes'].forEach(id=>document.getElementById(id).value='');
  saveState();renderAway();renderOverview();
}
function markReturned(id){const a=state.away.find(x=>x.id===id);if(a){a.returned=!a.returned;saveState();renderAway();renderOverview();}}
function renderAway(){
  const el=document.getElementById('away-list');
  if(!state.away.length){el.innerHTML='<div class="empty">Nothing away yet</div>';return;}
  const active=state.away.filter(a=>!a.returned),returned=state.away.filter(a=>a.returned);
  const ri=a=>`<div class="item${a.returned?' done-item':''}"><div class="item-header">
    <div style="flex:1;"><div class="item-title">${a.item}</div>
    <div class="item-sub">${[a.where,a.sent?'Sent '+fmtDate(a.sent):'',a.eta?`<span class="${overdue(a.eta)&&!a.returned?'overdue':''}">Back ${fmtDate(a.eta)}</span>`:'',a.notes].filter(Boolean).join(' · ')}</div></div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      ${a.returned?'<span class="badge badge-received">Returned</span>':'<span class="badge badge-away">Away</span>'}
      <button class="btn btn-sm"onclick="markReturned('${a.id}')">${a.returned?'Undo':'Mark returned'}</button>
      <button class="btn btn-danger btn-sm"onclick="del('away','${a.id}')">✕</button>
    </div>
  </div></div>`;
  el.innerHTML=active.map(ri).join('')+(returned.length?`<div style="font-size:12px;color:var(--text3);margin:12px 0 8px;font-family:var(--mono);">Returned</div>`+returned.map(ri).join(''):'');
}

function addQuote(){
  const desc=document.getElementById('q-desc').value.trim();if(!desc)return;
  state.quotes.push({id:uid(),desc,supplier:document.getElementById('q-supplier').value.trim(),date:document.getElementById('q-date').value,amount:document.getElementById('q-amount').value,status:document.getElementById('q-status').value,notes:document.getElementById('q-notes').value.trim()});
  ['q-desc','q-supplier','q-date','q-amount','q-notes'].forEach(id=>document.getElementById(id).value='');
  saveState();renderQuotes();
}
function updateQuoteStatus(id,val){const q=state.quotes.find(x=>x.id===id);if(q){q.status=val;saveState();renderQuotes();}}
function renderQuotes(){
  const el=document.getElementById('quotes-list');
  if(!state.quotes.length){el.innerHTML='<div class="empty">No quotes yet</div>';return;}
  el.innerHTML=state.quotes.map(q=>`
    <div class="item"><div class="item-header">
      <div style="flex:1;"><div class="item-title">${q.desc}</div><div class="item-sub">${[q.supplier,q.date?fmtDate(q.date):'',q.notes].filter(Boolean).join(' · ')}</div></div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        ${q.amount?`<span style="font-size:14px;font-weight:500;color:var(--accent);">${fmt(q.amount)}</span>`:''}
        <select class="btn btn-sm"style="padding:4px 8px;"onchange="updateQuoteStatus('${q.id}',this.value)">
          <option value="pending"${q.status==='pending'?' selected':''}>Pending</option>
          <option value="accepted"${q.status==='accepted'?' selected':''}>Accepted</option>
          <option value="rejected"${q.status==='rejected'?' selected':''}>Rejected</option>
        </select>
        <button class="btn btn-danger btn-sm"onclick="del('quotes','${q.id}')">✕</button>
      </div>
    </div></div>`).join('');
}

function render(){renderOverview();renderJobs();renderInspection();renderOrders();renderCosts();renderAway();renderQuotes();}

loadState();
render();
</script>
</body>
</html>
